# ╔══════════════════════════════════════════════════════════════╗
# ║                        tmux.conf                            ║
# ║     Zellij-style modes · Neovim-ready · Catppuccin Mocha    ║
# ║                  AZERTY / Ghostty / macOS                   ║
# ╚══════════════════════════════════════════════════════════════╝

# ─── Général ──────────────────────────────────────────────────

# Préfixe : Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix
set -g default-terminal "xterm-256color"

# Numérotation à partir de 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Souris (scroll, clic, resize)
set -g mouse on

# Historique généreux
set -g history-limit 50000

# Pas de délai après Escape (crucial pour Neovim)
set -sg escape-time 0

# Temps pour enchaîner les raccourcis repeat (-r)
set -g repeat-time 600

# Rafraîchir la status bar toutes les 5s
set -g status-interval 5

# Mode vi pour le copy-mode
setw -g mode-keys vi

# Recharger la config
bind r source-file ~/.tmux.conf \; display "  Config rechargée !"


# ─── Couleurs / True Color (Neovim-ready) ────────────────────

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-ghostty:RGB"

# Clipboard (OSC 52)
set -g set-clipboard on


# ─── Splits classiques (avec Prefix) ─────────────────────────

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %


# ═══════════════════════════════════════════════════════════════
#   MODES ZELLIJ-STYLE
#
#   Ctrl+a → p  →  Pane mode    (créer, naviguer, fermer)
#   Ctrl+a → t  →  Tab mode     (créer, naviguer, fermer)
#   Ctrl+a → R  →  Resize mode  (sticky — Escape pour sortir)
#   Ctrl+a → m  →  Move mode    (sticky — Escape pour sortir)
#
#   Les modes Pane et Tab sont "one-shot" : une action, retour.
#   Les modes Resize et Move sont "sticky" : on enchaîne.
#
#   Le mode actif s'affiche dans la status bar à droite.
# ═══════════════════════════════════════════════════════════════


# ─── PANE MODE (Prefix → p) ──────────────────────────────────
#
#   d = split down       r = split right      x = close
#   h/j/k/l = naviguer   z = zoom             Tab = next
#   ! = envoyer dans sa propre window
#   Space = changer le layout

bind p switch-client -T pane_mode

bind -T pane_mode d     split-window -v -c "#{pane_current_path}"
bind -T pane_mode r     split-window -h -c "#{pane_current_path}"
bind -T pane_mode x     kill-pane
bind -T pane_mode z     resize-pane -Z
bind -T pane_mode !     break-pane
bind -T pane_mode h     select-pane -L
bind -T pane_mode j     select-pane -D
bind -T pane_mode k     select-pane -U
bind -T pane_mode l     select-pane -R
bind -T pane_mode Up    select-pane -U
bind -T pane_mode Down  select-pane -D
bind -T pane_mode Left  select-pane -L
bind -T pane_mode Right select-pane -R
bind -T pane_mode Tab   select-pane -t :.+
bind -T pane_mode Space next-layout


# ─── TAB MODE (Prefix → t) ───────────────────────────────────
#
#   n = new tab          x = close tab        , = rename
#   m = move tab to pos  h/l = prev/next      Tab = last used
#   1-9 = aller au tab N

bind t switch-client -T tab_mode

bind -T tab_mode n     new-window -c "#{pane_current_path}"
bind -T tab_mode x     kill-window
bind -T tab_mode ,     command-prompt "rename-window '%%'"
bind -T tab_mode h     previous-window
bind -T tab_mode l     next-window
bind -T tab_mode Left  previous-window
bind -T tab_mode Right next-window
bind -T tab_mode m     command-prompt "move-window -t '%%'"
bind -T tab_mode Tab   last-window
bind -T tab_mode 1     select-window -t 1
bind -T tab_mode 2     select-window -t 2
bind -T tab_mode 3     select-window -t 3
bind -T tab_mode 4     select-window -t 4
bind -T tab_mode 5     select-window -t 5
bind -T tab_mode 6     select-window -t 6
bind -T tab_mode 7     select-window -t 7
bind -T tab_mode 8     select-window -t 8
bind -T tab_mode 9     select-window -t 9


# ─── RESIZE MODE (Prefix → R) — sticky ───────────────────────
#
#   h/j/k/l ou flèches = redimensionner (pas de 2)
#   H/J/K/L = redimensionner (pas de 5, plus rapide)
#   Escape ou Entrée = sortir

bind R switch-client -T resize_mode

bind -T resize_mode h     resize-pane -L 2 \; switch-client -T resize_mode
bind -T resize_mode j     resize-pane -D 2 \; switch-client -T resize_mode
bind -T resize_mode k     resize-pane -U 2 \; switch-client -T resize_mode
bind -T resize_mode l     resize-pane -R 2 \; switch-client -T resize_mode
bind -T resize_mode Left  resize-pane -L 2 \; switch-client -T resize_mode
bind -T resize_mode Right resize-pane -R 2 \; switch-client -T resize_mode
bind -T resize_mode Up    resize-pane -U 2 \; switch-client -T resize_mode
bind -T resize_mode Down  resize-pane -D 2 \; switch-client -T resize_mode
bind -T resize_mode H     resize-pane -L 5 \; switch-client -T resize_mode
bind -T resize_mode J     resize-pane -D 5 \; switch-client -T resize_mode
bind -T resize_mode K     resize-pane -U 5 \; switch-client -T resize_mode
bind -T resize_mode L     resize-pane -R 5 \; switch-client -T resize_mode


# ─── MOVE MODE (Prefix → m) — sticky ─────────────────────────
#
#   h/j/k/l ou flèches = déplacer le pane
#   Escape = sortir

bind m switch-client -T move_mode

bind -T move_mode h     swap-pane -U \; switch-client -T move_mode
bind -T move_mode j     swap-pane -D \; switch-client -T move_mode
bind -T move_mode k     swap-pane -U \; switch-client -T move_mode
bind -T move_mode l     swap-pane -D \; switch-client -T move_mode
bind -T move_mode Left  swap-pane -U \; switch-client -T move_mode
bind -T move_mode Right swap-pane -D \; switch-client -T move_mode
bind -T move_mode Up    swap-pane -U \; switch-client -T move_mode
bind -T move_mode Down  swap-pane -D \; switch-client -T move_mode


# ─── Raccourcis rapides (directement sous Prefix) ────────────

# Accès rapide aux tabs
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

# Session picker
bind s choose-tree -Zs

# Window picker
bind w choose-tree -Zw

# Scroll / copy mode
bind [ copy-mode

# Zoom rapide (sans passer par pane mode)
bind z resize-pane -Z

# Détacher
bind d detach-client


# ─── Copy mode (vi-style) ────────────────────────────────────

bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# Scroll speed (défaut = 5 lignes, réduit à 2)
bind -T copy-mode-vi WheelUpPane   send-keys -X -N 2 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 2 scroll-down


# ─── Navigation entre panes : Ctrl+h/j/k/l ───────────────────
#
#   Fonctionne sans prefix, navigation directe.
#   Quand tu installeras Neovim + vim-tmux-navigator,
#   commente le BLOC 1 et décommente le BLOC 2.

# BLOC 1 — Sans Neovim (inactif)
# bind -n C-h select-pane -L
# bind -n C-j select-pane -D
# bind -n C-k select-pane -U
# bind -n C-l select-pane -R

# BLOC 2 — Avec Neovim (actif)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# ─── Extended keys (nécessaire pour Shift+Enter avec ghostty) ──
# tmux décode la séquence CSI u de ghostty, puis le bind renvoie
# la même séquence \x1b[13;2u à l'application (Claude Code, etc.)
set -s extended-keys on
bind -n S-Enter send-keys Escape '[13;2u'

# ═══════════════════════════════════════════════════════════════
#   APPARENCE — Catppuccin Mocha
# ═══════════════════════════════════════════════════════════════

# ─── Status bar ───────────────────────────────────────────────

set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'

# Gauche : session name
set -g status-left '#[fg=#1e1e2e,bg=#89b4fa,bold]  #S #[fg=#89b4fa,bg=#1e1e2e] '
set -g status-left-length 30

# Droite : indicateur de mode (comme Zellij !) + heure
set -g status-right '#{?#{!=:#{client_key_table},root},#[fg=#1e1e2e#,bg=#f9e2af#,bold]  #{client_key_table} #[default] ,}#[fg=#6c7086] %H:%M  %d/%m '
set -g status-right-length 60

# Window active
setw -g window-status-current-style 'fg=#1e1e2e bg=#a6e3a1 bold'
setw -g window-status-current-format '  #I:#W#{?window_zoomed_flag, 󰊓,} '

# Windows inactives
setw -g window-status-style 'fg=#6c7086'
setw -g window-status-format '  #I:#W '

# Pas de séparateur
setw -g window-status-separator ''

# ─── Panes ────────────────────────────────────────────────────

set -g pane-border-indicators arrows
set -g pane-border-style 'fg=#45475a'
set -g pane-active-border-style 'fg=#89b4fa'

# ─── Messages ─────────────────────────────────────────────────

set -g message-style 'fg=#cdd6f4 bg=#313244 bold'
set -g message-command-style 'fg=#cdd6f4 bg=#313244'

# ─── Sélection copy mode ─────────────────────────────────────

setw -g mode-style 'fg=#1e1e2e bg=#f5c2e7 bold'


# ═══════════════════════════════════════════════════════════════
#   CHEAT SHEET
#
#   Ctrl+a → p    Pane mode     d/r/x/z/hjkl/Tab/Space/!
#   Ctrl+a → t    Tab mode      n/x/,/m/hjkl/1-9/Tab
#   Ctrl+a → R    Resize mode   hjkl (sticky, Esc to exit)
#   Ctrl+a → m    Move mode     hjkl (sticky, Esc to exit)
#
#   Ctrl+a → 1-9  Jump to tab
#   Ctrl+a → s    Session picker
#   Ctrl+a → w    Window picker
#   Ctrl+a → z    Zoom pane
#   Ctrl+a → [    Scroll / copy mode
#   Ctrl+a → d    Detach
#   Ctrl+a → r    Reload config
#   Ctrl+a → |    Split right
#   Ctrl+a → -    Split down
#
#   Ctrl+hjkl     Navigate panes (direct, no prefix)
# ═══════════════════════════════════════════════════════════════
